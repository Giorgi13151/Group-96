<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <label for="name">Name</label><br>
    <input type="text" placeholder="Enter Your Name" id="Name" name="Name" required><br>
    <label for="password">Password</label><br>
    <input type="password" placeholder="Enter Your Password" id="Password" name="Password" required><br>
    <input type="password" placeholder="Confirm Your Password" id="Password" name="Password" required><br>
    <label for="email">Email</label><br>
    <input type="email" placeholder="Enter Your Email Addres" id="Email" name="Email" required><br><br>
    <button type="submit">Submit</button>
    </form>
<!-- form,label,placeholder,type,id,required,input -->
<!-- name ატრიბუთი Form ში მომხარებელს ეუბნება რომ უნდა შემოიტანოს სახელი და უფრო აუმჯობესებს form ს ჩემი აზრით -->
<!-- Value ატრიბუთი აძლევს ღირებულებას სახელს და უფრო მარტივია -->
 <!-- form submitting მუშაობს შემდეგ ნაირად როდესაც შევავსებთ ფორმას და გავაგზავნით ის ინახება ბაზაში სადაც უკვე თითოეული პუნქტისთვის არის გამოყოფილი შესანახი -->
</body>
</html>
